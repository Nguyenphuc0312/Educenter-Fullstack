<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EduCenter — Trung tâm đào tạo công nghệ thông tin hàng đầu. Khám phá các khóa học ReactJS, VueJS, SQL, ASP.NET, Fullstack và nhiều hơn nữa." />
    <meta name="keywords" content="EduCenter, khóa học, lập trình, ReactJS, VueJS, SQL, Fullstack, học online" />
    <meta property="og:title" content="EduCenter — Hệ thống quản lý khóa học & học viên" />
    <meta property="og:description" content="Học cùng giảng viên giàu kinh nghiệm, nhận chứng chỉ uy tín. Đăng ký tư vấn miễn phí ngay hôm nay!" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>EduCenter — Hệ thống quản lý khóa học & học viên</title>
    <script>
      (function() {
        const theme = localStorage.getItem('educentertheme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
